<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألعاب المحل | الأسعار</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        .search-container { text-align: center; margin-bottom: 30px; }
        input[type="text"] { padding: 12px; width: 90%; max-width: 400px; border: 1px solid #30363d; border-radius: 25px; background-color: #21262d; color: #fff; outline: none; font-size: 16px; text-align: center;}
        input[type="text"]:focus { border-color: #58a6ff; box-shadow: 0 0 8px rgba(88, 166, 255, 0.4); }
        
        .section-title { margin-top: 30px; margin-bottom: 10px; font-size: 22px; display: inline-block; padding: 5px 15px; border-radius: 5px; color: #fff;}
        .title-ps5 { background-color: #1a5ca6; }
        .title-ps4 { background-color: #003791; }

        .table-container { overflow-x: auto; background-color: #161b22; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 12px; border: 1px solid #30363d; }
        
        /* ألوان رؤوس الجداول */
        .ps5-table th { background-color: #1a5ca6; color: white; }
        .ps4-table th { background-color: #003791; color: white; }
        .sub-header { background-color: #21262d !important; color: #8b949e !important; font-size: 13px; }
        
        tr:hover { background-color: #1c2128; }
        .price { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 أسعار ألعاب المحل 🎮</h1>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="🔍 ابحث عن اسم اللعبة هنا...">
    </div>

    <!-- قسم بلايستيشن 5 -->
    <div class="section-title title-ps5">ألعاب PS5</div>
    <div class="table-container">
        <table class="ps5-table">
            <thead>
                <tr>
                    <th rowspan="2" style="vertical-align: middle; width: 40%;">اسم اللعبة</th>
                    <th colspan="3">الأسعار</th>
                </tr>
                <tr>
                    <th class="sub-header">أوفلاين (OFF)</th>
                    <th class="sub-header">رئيسي (PR)</th>
                    <th class="sub-header">ثانوي (SC)</th>
                </tr>
            </thead>
            <tbody id="ps5Body">
                <!-- ألعاب PS5 هتتضاف هنا -->
            </tbody>
        </table>
    </div>

    <!-- قسم بلايستيشن 4 -->
    <div class="section-title title-ps4">ألعاب PS4</div>
    <div class="table-container">
        <table class="ps4-table">
            <thead>
                <tr>
                    <th rowspan="2" style="vertical-align: middle; width: 40%;">اسم اللعبة</th>
                    <th colspan="3">الأسعار</th>
                </tr>
                <tr>
                    <th class="sub-header">أوفلاين (OFF)</th>
                    <th class="sub-header">رئيسي (PR)</th>
                    <th class="sub-header">ثانوي (SC)</th>
                </tr>
            </thead>
            <tbody id="ps4Body">
                <!-- ألعاب PS4 هتتضاف هنا -->
            </tbody>
        </table>
    </div>

    <script>
        // =========================================================
        // ⚙️ منطقة إدارة ألعاب PS5 ⚙️
        // =========================================================
        const ps5Games = [
            { name: "EA Sports FC 26", off: "150", pr: "450", sc: "300" },
            { name: "Spider-Man 2", off: "250", pr: "600", sc: "450" },
            { name: "God of War Ragnarok", off: "200", pr: "500", sc: "350" }
        ];

        // =========================================================
        // ⚙️ منطقة إدارة ألعاب PS4 ⚙️
        // =========================================================
        const ps4Games = [
            { name: "EA Sports FC 26", off: "100", pr: "300", sc: "200" },
            { name: "GTA V", off: "80", pr: "250", sc: "150" },
            { name: "Crash Team Racing", off: "50", pr: "150", sc: "100" }
        ];


        // =========================================================
        // كود التشغيل (ماتعدلش حاجة هنا)
        // =========================================================
        
        // دالة لطباعة الألعاب في الجدول المخصص ليها
        function renderTable(gamesArray, tbodyId) {
            const tbody = document.getElementById(tbodyId);
            gamesArray.forEach(game => {
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight: bold; color: #fff;">${game.name}</td>
                    <td class="price">${game.off}</td>
                    <td class="price">${game.pr}</td>
                    <td class="price">${game.sc}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // تشغيل طباعة الجدولين
        renderTable(ps5Games, "ps5Body");
        renderTable(ps4Games, "ps4Body");

        // دالة البحث (بتبحث في الجدولين مع بعض)
        function searchTable() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tables = [document.getElementById("ps5Body"), document.getElementById("ps4Body")];

            tables.forEach(tbody => {
                let tr = tbody.getElementsByTagName("tr");
                for (let i = 0; i < tr.length; i++) {
                    let td = tr[i].getElementsByTagName("td")[0];
                    if (td) {
                        let txtValue = td.textContent || td.innerText;
                        if (txtValue.toUpperCase().indexOf(input) > -1) {
                            tr[i].style.display = "";
                        } else {
                            tr[i].style.display = "none";
                        }
                    }       
                }
            });
        }
    </script>
</body>
</html>
