<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألعاب المحل | الأسعار والباقات</title>
    <style>
        /* إعدادات عامة وتصميم الألوان */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 30px; text-shadow: 0 0 10px rgba(88, 166, 255, 0.3); }
        
        /* شريط البحث */
        .search-container { text-align: center; margin-bottom: 40px; }
        input[type="text"] { padding: 15px; width: 90%; max-width: 500px; border: 1px solid #30363d; border-radius: 30px; background-color: #161b22; color: #fff; outline: none; font-size: 16px; text-align: center; transition: 0.3s;}
        input[type="text"]:focus { border-color: #58a6ff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
        
        /* ---------------------------------- */
        /* تصميم كروت بلايستيشن بلس (PS Plus) */
        /* ---------------------------------- */
        .ps-plus-title { text-align: center; color: #ffd700; font-size: 26px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .plus-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        
        .plus-card { background-color: #161b22; border-radius: 12px; padding: 20px; border: 1px solid #30363d; text-align: center; transition: transform 0.3s; }
        .plus-card:hover { transform: translateY(-5px); }
        
        .tier-name { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .essential { color: #ffffff; }
        .extra { color: #fcc200; }
        .premium { color: #1a1a1a; background: linear-gradient(90deg, #fcc200, #ffeba8); padding: 5px; border-radius: 8px; display: inline-block; width: 100%; box-sizing: border-box;}
        
        .plus-prices { margin-top: 15px; text-align: right; }
        .plus-prices p { margin: 10px 0; font-size: 16px; border-bottom: 1px solid #30363d; padding-bottom: 8px;}
        .plus-prices span { font-weight: bold; color: #3fb950; float: left; }

        /* ---------------------------------- */
        /* تصميم جداول الألعاب (جنب بعض)      */
        /* ---------------------------------- */
        .tables-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 900px) { .tables-wrapper { grid-template-columns: 1fr; } } /* للموبايل */

        .table-container { background-color: #161b22; border-radius: 8px; border: 1px solid #30363d; overflow: hidden; }
        .section-title { font-size: 20px; text-align: center; padding: 15px; color: #fff; font-weight: bold; }
        .title-ps5 { background-color: #1a5ca6; }
        .title-ps4 { background-color: #003791; }

        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #30363d; border-left: 1px solid #30363d; font-size: 14px;}
        th:last-child, td:last-child { border-left: none; }
        
        .sub-header { background-color: #21262d; color: #8b949e; font-size: 13px; }
        tr:hover { background-color: #1c2128; }
        .price { color: #3fb950; font-weight: bold; }
        
        /* تنسيق حالة النفاذ */
        .sold-out { color: #da3633; font-size: 12px; font-weight: bold; background-color: rgba(218, 54, 51, 0.1); padding: 3px 6px; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>

    <h1>🎮 GAME SHOP 🎮</h1>

    <!-- قسم بلايستيشن بلس -->
    <h2 class="ps-plus-title">⭐ اشتراكات PlayStation Plus ⭐</h2>
    <div class="plus-container" id="psPlusContainer">
        <!-- كروت البلس هتترسم هنا أوتوماتيك من الجافاسكريبت -->
    </div>

    <!-- شريط البحث للألعاب -->
    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="🔍 ابحث عن اسم اللعبة هنا...">
    </div>

    <!-- قسم الألعاب (الجدولين جنب بعض) -->
    <div class="tables-wrapper">
        
        <!-- جدول PS5 -->
        <div class="table-container">
            <div class="section-title title-ps5">ألعاب PS5</div>
            <table class="ps5-table">
                <thead>
                    <tr>
                        <th rowspan="2" style="width: 40%;">اسم اللعبة</th>
                        <th colspan="3">الأسعار</th>
                    </tr>
                    <tr>
                        <th class="sub-header">OFF</th>
                        <th class="sub-header">PR</th>
                        <th class="sub-header">SC</th>
                    </tr>
                </thead>
                <tbody id="ps5Body"></tbody>
            </table>
        </div>

        <!-- جدول PS4 -->
        <div class="table-container">
            <div class="section-title title-ps4">ألعاب PS4</div>
            <table class="ps4-table">
                <thead>
                    <tr>
                        <th rowspan="2" style="width: 40%;">اسم اللعبة</th>
                        <th colspan="3">الأسعار</th>
                    </tr>
                    <tr>
                        <th class="sub-header">OFF</th>

            {name: "WWE22", off: "-", pr: "-", sc: "-"},
            {name: "WWE26", off: "-", pr: "-", sc: "-"}

        // =========================================================
        // 3️⃣ منطقة إدارة ألعاب PS4
        // =========================================================
        // (تم وضع نفس الألعاب لتسهيل التعديل، يمكنك حذف اللعبة التي لا تريدها هنا)
        const ps4Games = JSON.parse(JSON.stringify(ps5Games)); 
        // 👆 السطر ده بياخد نسخة من الألعاب اللي فوق وبيحطها في PS4 عشان نوفر مساحة الكود.
        // لو حبيت تفصلهم في المستقبل وتكتب ألعاب PS4 بإيدك، امسح السطر اللي فوق وابدأ القائمة زي بتاعت PS5 بالظبط.

        
        // =========================================================
        // ⚙️ كود التشغيل (ماتعدلش حاجة هنا)
        // =========================================================

        // رسم كروت البلس
        const plusContainer = document.getElementById("psPlusContainer");
        psPlusPrices.forEach(plan => {
            plusContainer.innerHTML += `
                <div class="plus-card">
                    <div class="tier-name ${plan.class}">${plan.tier}</div>
                    <div class="plus-prices">
                        <p>شهر واحد: <span>${plan.m1}</span></p>
                        <p>3 شهور: <span>${plan.m3}</span></p>
                        <p>سنة كاملة: <span>${plan.m12}</span></p>
                    </div>
                </div>
            `;
        });

        // رسم جداول الألعاب
        function formatPrice(val) {
            if (val.toLowerCase() === 'x' || val === '❌') return '<span class="sold-out">نفدت ❌</span>';
            return `<span class="price">${val}</span>`;
        }

        function renderTable(gamesArray, tbodyId) {
            const tbody = document.getElementById(tbodyId);
            gamesArray.forEach(game => {
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight: bold; color: #fff; text-align: left;" dir="ltr">${game.name}</td>
                    <td>${formatPrice(game.off)}</td>
                    <td>${formatPrice(game.pr)}</td>
                    <td>${formatPrice(game.sc)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        renderTable(ps5Games, "ps5Body");
        renderTable(ps4Games, "ps4Body");

        // البحث
        function searchTable() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tables = [document.getElementById("ps5Body"), document.getElementById("ps4Body")];

            tables.forEach(tbody => {
                let tr = tbody.getElementsByTagName("tr");
                for (let i = 0; i < tr.length; i++) {
                    let td = tr[i].getElementsByTagName("td")[0];
                    if (td) {
                        let txtValue = td.textContent || td.innerText;
                        if (txtValue.toUpperCase().indexOf(input) > -1) {
                            tr[i].style.display = "";
                        } else {
                            tr[i].style.display = "none";
                        }
                    }       
                }
            });
        }
    </script>
